<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0f1b30"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5bbec9"/>
      <stop offset="100%" stop-color="#3a8fa0"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- 三叶风扇 -->
  <g transform="translate(128,128)">
    <!-- 叶片1 (上) -->
    <path d="M0,-12 C-8,-28 -20,-62 -10,-82 C0,-95 18,-95 26,-78 C34,-62 22,-30 12,-12 Z" fill="url(#blade)" opacity="0.95"/>
    <!-- 叶片2 (右下) -->
    <path d="M10,6 C24,16 54,36 66,52 C74,66 62,80 46,76 C30,72 8,48 0,30 Z" fill="url(#blade)" opacity="0.85"/>
    <!-- 叶片3 (左下) -->
    <path d="M-10,6 C-24,16 -54,36 -66,52 C-74,66 -62,80 -46,76 C-30,72 -8,48 0,30 Z" fill="url(#blade)" opacity="0.9"/>
    <!-- 中心圆 -->
    <circle r="14" fill="#16213e" stroke="#53a8b6" stroke-width="3"/>
    <circle r="5" fill="#53a8b6"/>
  </g>
  <!-- 底部温度计装饰 -->
  <g transform="translate(200,200)" opacity="0.6">
    <rect x="-3" y="-20" width="6" height="20" rx="3" fill="#e74c3c"/>
    <circle r="7" fill="#e74c3c"/>
  </g>
</svg>
